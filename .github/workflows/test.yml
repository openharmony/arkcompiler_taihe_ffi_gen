name: test

on:
    [push, pull_request]

jobs:
  check_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/install_independencies/
      - name: Install Dependencies
        working-directory: compiler
        run: uv sync
      - name: Set up Clang
        uses: egor-tensin/setup-clang@v1
        with:
          version: 15
          platform: x64
      - name: Generate Code
        working-directory: compiler
        run: source .venv/bin/activate && ./generate-grammar
      - name: Check Format
        run: scripts/check
      - name: Test and Report Coverage
        run: scripts/test
